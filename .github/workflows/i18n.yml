name: Web i18n Check

on:
    pull_request:
        paths:
            - "web/app/**"
            - "web/i18n/**"
            - "web/scripts/check-i18n.ts"
            - "web/package.json"
            - ".github/workflows/i18n.yml"
    push:
        branches:
            - main
        paths:
            - "web/app/**"
            - "web/i18n/**"
            - "web/scripts/check-i18n.ts"
            - "web/package.json"
            - ".github/workflows/i18n.yml"

jobs:
    check-i18n:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.11

            - name: Install dependencies
              run: bun install

            - name: Check i18n keys usage and coverage
              working-directory: web
              run: bun run check:i18n
