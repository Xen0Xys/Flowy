services:
    flowy-postgres:
        image: tensorchord/vchord-postgres:pg18-v1.1.1
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-flowy}
            POSTGRES_USER: ${POSTGRES_USER:-flowy}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowy}
        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -d ${POSTGRES_DB:-flowy} -U ${POSTGRES_USER:-flowy}
            interval: 10s
            timeout: 5s
            retries: 5
        volumes:
            - flowy-db-data:/var/lib/postgresql

    flowy-server:
        build:
            context: ./server
            dockerfile: Dockerfile
            args:
                DATABASE_URL: postgres://${POSTGRES_USER:-flowy}:${POSTGRES_PASSWORD:-flowy}@flowy-postgres:5432/${POSTGRES_DB:-flowy}
        environment:
            DATABASE_URL: postgres://${POSTGRES_USER:-flowy}:${POSTGRES_PASSWORD:-flowy}@flowy-postgres:5432/${POSTGRES_DB:-flowy}
            APP_NAME: Flowy Server
            APP_SECRET: ${APP_SECRET:-change-me}
            PREFIX: ${APP_PREFIX:-}
            CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
        healthcheck:
            test: ["CMD", "curl", "-f", "http://flowy-server:4000/version"]
            interval: 10s
            timeout: 5s
            retries: 5
        depends_on:
            flowy-postgres:
                condition: service_healthy
        ports:
            - "4000:4000"
        restart: unless-stopped

    flowy-web:
        build:
            context: ./web
            dockerfile: Dockerfile
        environment:
            NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:4000}
        healthcheck:
            test: ["CMD", "curl", "-f", "http://flowy-web:3000/"]
            interval: 10s
            timeout: 5s
            retries: 5
        depends_on:
            flowy-server:
                condition: service_started
        ports:
            - "3000:3000"
        restart: unless-stopped

volumes:
    flowy-db-data:
        driver: local
